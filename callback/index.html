<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WirelessPaper · Spotify auth</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: #111;
      color: #eee;
      font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .card {
      max-width: 440px;
      width: 100%;
      background: #1c1c1c;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 28px 24px;
      text-align: center;
    }
    h1 { margin: 0 0 8px; font-size: 20px; }
    p { margin: 8px 0; color: #aaa; }
    .ok    { color: #6fbf6f; }
    .warn  { color: #e8b55a; }
    .err   { color: #e85a5a; }
    .code  {
      background: #0b0b0b;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 10px 12px;
      font: 13px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
      word-break: break-all;
      color: #ddd;
      text-align: left;
      margin: 16px 0;
    }
    .btn {
      display: inline-block;
      background: #2c2c2c;
      color: #eee;
      border: 1px solid #3a3a3a;
      border-radius: 10px;
      padding: 10px 18px;
      text-decoration: none;
      font-weight: 600;
      margin: 6px 3px;
      cursor: pointer;
    }
    .btn.primary { background: #1db954; border-color: #1db954; color: #fff; }
    .btn:hover   { filter: brightness(1.1); }
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid #3a3a3a;
      border-top-color: #eee;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: -2px;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card" id="card">
    <h1 id="title"><span class="spinner"></span>Connecting to your device…</h1>
    <p id="sub">Forwarding the auth code back to WirelessPaper.</p>
    <div id="manual" style="display:none"></div>
  </div>

<script>
(function () {
  // ── Parse URL parameters ─────────────────────────────────────────────────
  const qs    = new URLSearchParams(window.location.search);
  const code  = qs.get("code");
  const state = qs.get("state");
  const err   = qs.get("error");

  const title  = document.getElementById("title");
  const sub    = document.getElementById("sub");
  const manual = document.getElementById("manual");

  // ── Error case: user hit Cancel on Spotify ──────────────────────────────
  if (err) {
    title.innerHTML = '<span class="err">✗</span> Auth cancelled';
    sub.textContent = "Spotify returned: " + err;
    return;
  }

  // ── Sanity: need both code and state ────────────────────────────────────
  if (!code) {
    title.innerHTML = '<span class="err">✗</span> Missing code';
    sub.textContent = "The auth redirect came back without a code parameter. Try again from the device.";
    return;
  }
  if (!state) {
    title.innerHTML = '<span class="warn">⚠</span> Missing device return address';
    sub.textContent = "Spotify did not return the device-return URL. Try again from the device.";
    return;
  }

  // ── Validate the state looks like a device-local URL ────────────────────
  // We accept only http:// URLs that parse cleanly. This stops the page from
  // open-redirecting to arbitrary sites if someone crafts a weird auth URL.
  let target;
  try {
    target = new URL(state);
  } catch (e) {
    title.innerHTML = '<span class="err">✗</span> Invalid return URL';
    sub.textContent = "The device-return URL couldn't be parsed.";
    return;
  }
  if (target.protocol !== "http:") {
    title.innerHTML = '<span class="err">✗</span> Rejected non-http return URL';
    sub.textContent = "Safety check: only http:// LAN URLs are allowed.";
    return;
  }

  // ── Build the forward URL: <state>?code=<code> ──────────────────────────
  target.searchParams.set("code", code);
  const forwardTo = target.toString();

  // ── Give the user a manual option in case auto-forward gets blocked ─────
  manual.style.display = "block";
  manual.innerHTML =
    '<p style="margin-top:18px">If nothing happens in a second, tap below:</p>' +
    '<p><a class="btn primary" href="' + forwardTo + '">Continue to device</a></p>' +
    '<p class="code">' + forwardTo + '</p>';

  // ── Auto-forward after a short delay so the user sees the status ────────
  setTimeout(function () {
    window.location.replace(forwardTo);
  }, 600);
})();
</script>
</body>
</html>
